<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不分類資源班增強點數系統 - 嘉義市民生國中</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap');

        :root {
            --bg-color: #FDFBF7;
            --card-bg: #FFFFFF;
            --border-soft: #E0D7C6;
            --text-main: #4A4439;
            --text-muted: #8E8474;
            --primary-color: #8BA88E; 
            --point-bg: #FEF9E7;
            --point-text: #B87333;
            
            /* 按鈕漸層柔和色調 */
            --btn-sub-5: #C27878; /* 柔和磚紅 */
            --btn-sub-1: #DCA3A3; /* 櫻花粉紅 */
            --btn-add-1: #A3C2A3; /* 淺草綠 */
            --btn-add-5: #78A378; /* 森林綠 */
        }

        body {
            /* 優先使用芫荽體，若無則降級使用 Klee One 或系統字體 */
            font-family: 'Iansui', '芫荽', 'Klee One', 'PingFang TC', '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 30px;
            padding: 15px 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .time-display {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .period-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--primary-color);
            padding: 6px 20px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .controls-container {
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }

        .control-group {
            background-color: var(--card-bg);
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-group label {
            font-size: 1.2rem;
            font-weight: 600;
            margin-right: 20px;
            letter-spacing: 2px;
        }

        select {
            padding: 8px 15px;
            font-size: 1.2rem;
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            background-color: #FFF;
            color: var(--text-main);
            cursor: pointer;
            width: 200px;
            text-align: center;
            font-family: inherit; /* 繼承芫荽體 */
        }

        .student-grid {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .student-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s ease, box-shadow 0.3s ease;
        }
        
        .student-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .student-name {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .point-badge {
            width: 75px;
            height: 75px;
            background-color: var(--point-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            border: 3px solid var(--point-text);
        }

        .point-number {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--point-text);
            font-family: inherit;
        }

        /* 將四顆按鈕改為同一排 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 10px 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-family: inherit; /* 繼承芫荽體 */
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        button:active { transform: scale(0.92); }
        button:hover { opacity: 0.85; }

        .btn-sub-5 { background-color: var(--btn-sub-5); }
        .btn-sub-1 { background-color: var(--btn-sub-1); }
        .btn-add-1 { background-color: var(--btn-add-1); }
        .btn-add-5 { background-color: var(--btn-add-5); }

        .footer-actions {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .share-btn {
            background-color: var(--primary-color);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(139, 168, 142, 0.4);
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="time-display" id="date-time-display">...</div>
        <div class="period-display" id="period-display">...</div>
    </div>

    <div class="controls-container">
        <div class="control-group">
            <label for="group-select">組別選擇</label>
            <select id="group-select">
                <option value="">請選擇</option>
                <option value="２Ｃ">２Ｃ</option>
                <option value="１Ａ">１Ａ</option>
                <option value="１Ｂ">１Ｂ</option>
                <option value="１Ｃ">１Ｃ</option>
                <option value="跨Ｄ">跨Ｄ</option>
                <option value="視障">視障</option>
            </select>
        </div>
    </div>

    <div class="student-grid" id="student-grid"></div>

    <div class="footer-actions">
        <button class="share-btn" id="share-btn" onclick="generateShareLink()">📤 產生目前點數分享連結</button>
    </div>

    <script>
        const studentsData = {
            "２Ｃ": ["陳采稼", "楊依潔", "李虹渝", "李婭琳", "黃偉耕", "吳柏毅", "黃益庠", "梁永明"],
            "１Ａ": ["羅煒晴", "葉和頤", "莊軒暠", "蕭卉均", "賴奕叡", "吳其叡", "蔡盈盈", "林子苓"],
            "１Ｂ": ["蘇翊凱", "曾泰瑄", "謝若曦", "黃甫暄", "陳廷宥", "許帛軒"],
            "１Ｃ": ["吳冠旻", "凃禹楷", "黃育璿", "林埕億", "李威霆"],
            "跨Ｄ": ["游雲欣", "張芳瑜", "詹濬溢", "陳勝宏", "李芷若", "林孮翰"],
            "視障": ["蔣采芹", "林佳芳", "陳采稼"]
        };

        const schedule = [
            { name: "早自修", start: 7 * 60 + 30, end: 8 * 60 + 15 },
            { name: "第一節", start: 8 * 60 + 16, end: 9 * 60 + 0 },
            { name: "第二節", start: 9 * 60 + 15, end: 10 * 60 + 0 },
            { name: "第三節", start: 10 * 60 + 10, end: 10 * 60 + 55 },
            { name: "第四節", start: 11 * 60 + 5,  end: 11 * 60 + 50 },
            { name: "午休",   start: 12 * 60 + 35, end: 13 * 60 + 20 },
            { name: "第五節", start: 13 * 60 + 30, end: 14 * 60 + 15 },
            { name: "第六節", start: 14 * 60 + 25, end: 15 * 60 + 10 },
            { name: "第七節", start: 15 * 60 + 20, end: 16 * 60 + 5 },
            { name: "第八節", start: 16 * 60 + 15, end: 17 * 60 + 0 }
        ];

        let studentPoints = JSON.parse(localStorage.getItem('spedPointsDB')) || {};

        function checkURLParams() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const sharedData = JSON.parse(decodeURIComponent(hash));
                    studentPoints = { ...studentPoints, ...sharedData };
                    localStorage.setItem('spedPointsDB', JSON.stringify(studentPoints));
                    alert("已成功匯入分享的點數資料！");
                    window.location.hash = "";
                } catch (e) { console.error("資料解析失敗"); }
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('date-time-display').innerText = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit', weekday:'long'});
            const mins = now.getHours() * 60 + now.getMinutes();
            let period = "休息時間";
            for (let p of schedule) { if (mins >= p.start && mins <= p.end) { period = p.name; break; } }
            document.getElementById('period-display').innerText = period;
        }

        function changePoint(name, delta) {
            studentPoints[name] = (studentPoints[name] || 0) + delta;
            if (studentPoints[name] < 0) studentPoints[name] = 0;
            localStorage.setItem('spedPointsDB', JSON.stringify(studentPoints));
            renderStudents(true);
        }

        function renderStudents(isUpdate = false) {
            const group = document.getElementById('group-select').value;
            const grid = document.getElementById('student-grid');
            const shareBtn = document.getElementById('share-btn');

            if (!group) {
                grid.innerHTML = "";
                shareBtn.style.display = "none";
                return;
            }

            shareBtn.style.display = "block";
            let students = [...studentsData[group]];
            
            students.sort((a, b) => (studentPoints[b] || 0) - (studentPoints[a] || 0));

            grid.innerHTML = "";
            students.forEach(name => {
                const pts = studentPoints[name] || 0;
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="student-name">${name}</div>
                    <div class="point-badge"><span class="point-number">${pts}</span></div>
                    <div class="btn-group">
                        <button class="btn-sub-5" onclick="changePoint('${name}', -5)">-5</button>
                        <button class="btn-sub-1" onclick="changePoint('${name}', -1)">-1</button>
                        <button class="btn-add-1" onclick="changePoint('${name}', 1)">+1</button>
                        <button class="btn-add-5" onclick="changePoint('${name}', 5)">+5</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function generateShareLink() {
            const group = document.getElementById('group-select').value;
            if (!group) return;
            
            const dataToShare = {};
            studentsData[group].forEach(name => {
                dataToShare[name] = studentPoints[name] || 0;
            });

            const jsonStr = JSON.stringify(dataToShare);
            const shareUrl = window.location.origin + window.location.pathname + "#" + encodeURIComponent(jsonStr);
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("分享連結已產生並複製到剪貼簿！\n您可以將連結傳給其他老師，對方開啟後即可看到這些點數。");
            });
        }

        document.getElementById('group-select').addEventListener('change', () => renderStudents());
        window.onload = () => { checkURLParams(); updateTime(); setInterval(updateTime, 60000); };
    </script>
</body>
</html>
